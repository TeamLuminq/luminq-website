<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .map-background { fill: #f5f5f5; }
      .grid-line { stroke: #e0e0e0; stroke-width: 1; }
      .major-street { stroke: #e0e0e0; stroke-width: 2; }
      .marker-circle { fill: #0a8fa3; opacity: 0.9; }
      .marker-outline { stroke: #ffffff; stroke-width: 2; fill: none; }
      .marker-dot { fill: #ffffff; }
      .location-text { font-family: Arial, sans-serif; font-size: 12px; fill: #333333; font-weight: bold; }
      .location-subtext { font-family: Arial, sans-serif; font-size: 10px; fill: #333333; }
    </style>
  </defs>

  <!-- Map background -->
  <rect class="map-background" width="600" height="300"/>

  <!-- Street grid pattern - creating a subtle street layout -->
  <!-- Horizontal streets -->
  <line class="grid-line" x1="0" y1="50" x2="600" y2="50"/>
  <line class="grid-line" x1="0" y1="100" x2="600" y2="100"/>
  <line class="grid-line" x1="0" y1="150" x2="600" y2="150"/>
  <line class="grid-line" x1="0" y1="200" x2="600" y2="200"/>
  <line class="grid-line" x1="0" y1="250" x2="600" y2="250"/>

  <!-- Vertical streets -->
  <line class="grid-line" x1="75" y1="0" x2="75" y2="300"/>
  <line class="grid-line" x1="150" y1="0" x2="150" y2="300"/>
  <line class="grid-line" x1="225" y1="0" x2="225" y2="300"/>
  <line class="grid-line" x1="300" y1="0" x2="300" y2="300"/>
  <line class="grid-line" x1="375" y1="0" x2="375" y2="300"/>
  <line class="grid-line" x1="450" y1="0" x2="450" y2="300"/>
  <line class="grid-line" x1="525" y1="0" x2="525" y2="300"/>

  <!-- Major streets (slightly thicker) -->
  <line class="major-street" x1="0" y1="75" x2="600" y2="75"/>
  <line class="major-street" x1="0" y1="175" x2="600" y2="175"/>
  <line class="major-street" x1="225" y1="0" x2="225" y2="300"/>
  <line class="major-street" x1="450" y1="0" x2="450" y2="300"/>

  <!-- Parks/green spaces (subtle background areas) -->
  <rect x="20" y="20" width="100" height="80" fill="#e8f5e9" opacity="0.4"/>
  <rect x="480" y="200" width="100" height="80" fill="#e8f5e9" opacity="0.4"/>

  <!-- Center marker pin -->
  <!-- Outer circle (glow effect) -->
  <circle cx="300" cy="150" r="28" fill="#0a8fa3" opacity="0.2"/>

  <!-- Main marker circle -->
  <circle class="marker-circle" cx="300" cy="150" r="20"/>

  <!-- Marker outline ring -->
  <circle class="marker-outline" cx="300" cy="150" r="20"/>

  <!-- Inner dot -->
  <circle class="marker-dot" cx="300" cy="150" r="8"/>

  <!-- Location information box -->
  <rect x="20" y="20" width="280" height="70" fill="#ffffff" stroke="#0a8fa3" stroke-width="1" rx="3" opacity="0.95"/>
  
  <text class="location-text" x="30" y="40">Gatehouse by Spacemade</text>
  <text class="location-subtext" x="30" y="55">1 Armoury Way</text>
  <text class="location-subtext" x="30" y="68">London SW18 1TH</text>
  <text class="location-subtext" x="30" y="81">51.4571°N, 0.1870°W</text>

  <!-- Compass rose (simple) -->
  <g transform="translate(560, 30)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    <text x="-3" y="-12" class="location-subtext" text-anchor="middle">N</text>
    <line x1="0" y1="-12" x2="0" y2="-8" stroke="#0a8fa3" stroke-width="2"/>
  </g>

  <!-- Scale indicator -->
  <g transform="translate(20, 275)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#333333" stroke-width="2"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#333333" stroke-width="2"/>
    <line x1="50" y1="-3" x2="50" y2="3" stroke="#333333" stroke-width="2"/>
    <text x="25" y="15" class="location-subtext" text-anchor="middle">~500m</text>
  </g>
</svg>
